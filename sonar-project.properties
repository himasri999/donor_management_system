# SonarCloud Security-focused Configuration
sonar.projectKey=himasri999_donor-management-system-1
sonar.organization=himasri999
sonar.projectName=Donor Management System - Security Analysis
sonar.projectVersion=1.0

# Source directories
sonar.sources=backend/src,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.js,**/coverage/**,**/*.min.js

# Security-focused rules
sonar.qualitygate.wait=true
sonar.security.hotspots.inheritFromParent=true

# Language settings
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
sonar.typescript.lcov.reportPaths=**/coverage/lcov.info