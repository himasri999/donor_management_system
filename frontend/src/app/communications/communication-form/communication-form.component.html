<div class="card mb-4">
  <div class="card-header">
    <h5>{{ communication ? 'Edit' : 'Add' }} Communication</h5>
  </div>
  <div class="card-body">
    <form [formGroup]="communicationForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Donor *</label>
        <select class="form-select" formControlName="donor_id"
                [class.is-invalid]="communicationForm.get('donor_id')?.invalid && communicationForm.get('donor_id')?.touched">
          <option value="">Select Donor</option>
          <option *ngFor="let donor of donors" [value]="donor.id">{{ donor.name }}</option>
        </select>
        <div class="invalid-feedback" *ngIf="communicationForm.get('donor_id')?.invalid && communicationForm.get('donor_id')?.touched">
          Donor is required
        </div>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Message *</label>
        <textarea class="form-control" formControlName="message" rows="4"
                  [class.is-invalid]="communicationForm.get('message')?.invalid && communicationForm.get('message')?.touched"></textarea>
        <div class="invalid-feedback" *ngIf="communicationForm.get('message')?.invalid && communicationForm.get('message')?.touched">
          Message is required
        </div>
      </div>
      
      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
      
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="communicationForm.invalid || loading">
          {{ loading ? 'Saving...' : 'Save' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
