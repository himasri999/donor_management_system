<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Donations</h2>
  <button class="btn btn-primary" (click)="showForm = true">Add Donation</button>
</div>

<app-donation-form *ngIf="showForm" [donation]="editingDonation" [donors]="donors" (close)="onFormClose()"></app-donation-form>

<div class="table-responsive">
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Donor</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let donation of donations">
        <td>{{ donation.donor_name }}</td>
        <td>${{ donation.amount }}</td>
        <td>{{ donation.donation_date | date }}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-2" (click)="editDonation(donation)">Edit</button>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteDonation(donation.id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
