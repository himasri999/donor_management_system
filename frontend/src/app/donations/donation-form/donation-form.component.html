<div class="card mb-4">
  <div class="card-header">
    <h5>{{ donation ? 'Edit' : 'Add' }} Donation</h5>
  </div>
  <div class="card-body">
    <form [formGroup]="donationForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Donor *</label>
        <select class="form-select" formControlName="donor_id"
                [class.is-invalid]="donationForm.get('donor_id')?.invalid && donationForm.get('donor_id')?.touched">
          <option value="">Select Donor</option>
          <option *ngFor="let donor of donors" [value]="donor.id">{{ donor.name }}</option>
        </select>
        <div class="invalid-feedback" *ngIf="donationForm.get('donor_id')?.invalid && donationForm.get('donor_id')?.touched">
          Donor is required
        </div>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Amount *</label>
        <input type="number" class="form-control" formControlName="amount" step="0.01"
               [class.is-invalid]="donationForm.get('amount')?.invalid && donationForm.get('amount')?.touched">
        <div class="invalid-feedback" *ngIf="donationForm.get('amount')?.invalid && donationForm.get('amount')?.touched">
          Amount must be greater than 0
        </div>
      </div>
      
      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
      
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="donationForm.invalid || loading">
          {{ loading ? 'Saving...' : 'Save' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
