<div class="card mb-4">
  <div class="card-header">
    <h5>{{ donor ? 'Edit' : 'Add' }} Donor</h5>
  </div>
  <div class="card-body">
    <form [formGroup]="donorForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-6">
          <div class="mb-3">
            <label class="form-label">Name *</label>
            <input type="text" class="form-control" formControlName="name"
                   [class.is-invalid]="donorForm.get('name')?.invalid && donorForm.get('name')?.touched">
            <div class="invalid-feedback" *ngIf="donorForm.get('name')?.invalid && donorForm.get('name')?.touched">
              Name is required
            </div>
          </div>
        </div>
        
        <div class="col-md-6">
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" formControlName="email"
                   [class.is-invalid]="donorForm.get('email')?.invalid && donorForm.get('email')?.touched">
            <div class="invalid-feedback" *ngIf="donorForm.get('email')?.invalid && donorForm.get('email')?.touched">
              Valid email is required
            </div>
          </div>
        </div>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-control" formControlName="phone"
               [class.is-invalid]="donorForm.get('phone')?.invalid && donorForm.get('phone')?.touched">
        <div class="invalid-feedback" *ngIf="donorForm.get('phone')?.invalid && donorForm.get('phone')?.touched">
          Phone must be 10 digits
        </div>
      </div>
      
      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
      
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="donorForm.invalid || loading">
          {{ loading ? 'Saving...' : 'Save' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
